name: Unit Test Workflow

# Run the unit tests pipeline on pull requests to main, and manually on demand.
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Unit Test CI Check
    runs-on: ubuntu-latest

    steps:
    # Checkout repo
    - name: Checkout repo
      uses: actions/checkout@v4

    # Set up Python environment
    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.11.9"

    # Install the package and its development dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    # Run unit tests with pytest (discovery is configured in pyproject.toml)
    - name: Run tests
      run: |
        pytest
