name: Code Coverage Workflow

# Run the coverage pipeline on pull requests to main, and manually on demand.
# The job fails (and blocks the PR) when total coverage drops below 80%.
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  coverage:
    name: Code Coverage CI Check
    runs-on: ubuntu-latest

    steps:
    # Checkout repo
    - name: Checkout repo
      uses: actions/checkout@v4

    # Set up Python environment
    - name: Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.11.9"

    # Install the package and its development dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    # Run the tests under coverage. --cov-fail-under=80 is the gate: the step exits
    # non-zero (failing the PR check) if total coverage is below 80%. The XML report
    # feeds the Codecov upload below.
    - name: Run tests with coverage
      run: |
        pytest --cov=fishbowl_common --cov-report=xml --cov-report=term --cov-fail-under=80

    # Publish the coverage report to Codecov (drives the coverage percentage badge).
    # Requires a CODECOV_TOKEN repo secret; the upload soft-fails so a Codecov
    # outage never masks or blocks the coverage gate above.
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
